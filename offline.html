<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Toolkit — 离线</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #fbfbfd; color: #1d1d1f;
      text-align: center; padding: 24px;
    }
    .offline-card {
      max-width: 420px; padding: 48px 32px;
      background: #fff; border-radius: 20px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    }
    .offline-icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 15px; color: #86868b; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block; padding: 12px 28px;
      background: #0071e3; color: #fff; border: none;
      border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #0077ed; }
    .btn:active { transform: scale(0.96); }
    @media (prefers-color-scheme: dark) {
      body { background: #000; color: #f5f5f7; }
      .offline-card { background: #1c1c1e; box-shadow: 0 2px 20px rgba(0,0,0,0.3); }
      p { color: #a1a1a6; }
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">📡</div>
    <h1>暂无网络连接</h1>
    <p>Career Toolkit 需要网络连接才能首次加载。连接网络后刷新页面即可使用，之后将支持离线访问。</p>
    <button class="btn" onclick="location.reload()">重新尝试</button>
  </div>
</body>
</html>
